<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Planes Mascotas | SURA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --azul-vivo:    #2D6DF6;
      --azul-profundo:#0033A0;
      --fondo-azul:   #DFEAFF;
      --borde-azul:   #81B1FF;
      --negro:        #0D0D0D;
      --gris-500:     #3F3F41;
      --gris:         #888B8D;
      --gris-palido:  #B4B4B5;
      --blanco:       #FFFFFF;
      --texto-desc:   #606060;
      --texto-sec:    #5A5A5A;
      --divider:      #E8ECF2;
      --sombra-card:  0 8px 25px 0 rgba(83,89,144,.07);
      --sombra-ac:    0 2px 4px rgba(106,115,129,.12);
      --f: 'Nunito', sans-serif;
      --tr: .22s ease;
    }

    body {
      font-family: var(--f);
      background: #F4F6FB;
      color: var(--negro);
      -webkit-font-smoothing: antialiased;
    }

    /* ─── Sección raíz ─── */
    .planes {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
      padding: 40px 20px 56px;
      max-width: 1140px;
      margin: 0 auto;
    }

    /* ═══════════════
       TABS — mobile
    ══════════════════ */
    .planes__tabs {
      display: flex;
      justify-content: flex-start;
      gap: 8px;
      width: 100%;
    }

    .tab-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      width: auto;
      flex-shrink: 0;
      border: 1px solid var(--gris);
      border-radius: 16px;
      background: var(--blanco);
      cursor: pointer;
      font-family: var(--f);
      font-size: 14px;
      font-weight: 700;
      color: var(--gris-500);
      text-align: center;
      transition: background var(--tr), border-color var(--tr), color var(--tr);
    }

    .tab-btn.active {
      background: var(--fondo-azul);
      border-color: var(--azul-vivo);
      color: var(--azul-vivo);
    }

    /* Iconos DS SURA 2024 — contenedor + inset exacto del DS */
    .tab-icon-wrap {
      position: relative;
      width: 40px;
      height: 40px;
      flex-shrink: 0;
      overflow: hidden;
    }
    .tab-icon-inner { position: absolute; }
    .tab-icon {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      filter: grayscale(1) brightness(0.65);
      transition: filter var(--tr);
    }
    .tab-btn.active .tab-icon { filter: none; }

    .tab-label--long  { display: none; }
    .tab-label--short { display: inline; white-space: nowrap; }

    /* ─── Content panels ─── */
    .planes__panel { display: none; width: 100%; }
    .planes__panel.active { display: block; }

    .ds-check img, .ds-dash img { display: block; }

    /* ─── Grid móvil ─── */
    .planes__grid {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* ═══════════════
       PLAN CARD
    ══════════════════ */
    .plan-card {
      background: var(--blanco);
      border: 1px solid var(--fondo-azul);
      border-radius: 12px;
      box-shadow: var(--sombra-card);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .plan-card__head {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 16px 16px 0;
    }

    .card-name {
      font-size: 20px;
      font-weight: 700;
      color: var(--azul-vivo);
      line-height: 22px;
    }

    .card-price-row {
      display: flex;
      align-items: flex-end;
      gap: 4px;
      white-space: nowrap;
    }

    .price-desde, .price-periodo {
      font-size: 14px;
      font-weight: 400;
      color: var(--negro);
      line-height: normal;
    }

    .price-val {
      font-size: 24px;
      font-weight: 700;
      color: var(--azul-vivo);
      line-height: 26px;
    }

    .card-desc {
      font-size: 12px;
      font-weight: 600;
      color: var(--texto-desc);
      line-height: normal;
    }

    .card-cov-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px 0 0;
      gap: 5px;
    }

    .card-cov-inner {
      display: flex;
      flex-direction: column;
      gap: 6px;
      width: 330px;
      max-width: 100%;
    }

    .cov-row {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .cov-row__text {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      width: 283px;
      max-width: 100%;
    }

    .cov-row__top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      font-size: 14px;
      white-space: nowrap;
    }

    .cov-lbl { font-weight: 600; color: var(--azul-profundo); }
    .cov-val { font-weight: 400; color: var(--gris-500); }

    .cov-note {
      font-size: 12px;
      font-weight: 400;
      color: var(--gris-palido);
      line-height: normal;
    }

    .cov-divider {
      width: 100%;
      height: 1px;
      background: var(--divider);
    }

    .card-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: none;
      border: none;
      cursor: pointer;
      width: 100%;
      font-family: var(--f);
    }

    .card-toggle__label {
      font-size: 16px;
      font-weight: 700;
      color: var(--azul-profundo);
      line-height: 1;
    }

    .card-toggle__arrow { flex-shrink: 0; }
    .card-toggle.open .card-toggle__arrow .ds-chevron { transform: rotate(180deg); }

    .card-why {
      overflow: hidden;
      max-height: 0;
      transition: max-height .35s ease;
    }
    .card-why.open { max-height: 800px; }

    .why-inner {
      display: flex;
      flex-direction: column;
      gap: 5px;
      padding: 0 20px 12px;
    }

    .why-title {
      font-size: 14px;
      font-weight: 800;
      color: var(--gris-500);
      line-height: normal;
    }

    .why-desc {
      font-size: 14px;
      font-weight: 400;
      color: var(--gris);
      line-height: normal;
    }
    .why-desc strong { font-weight: 700; color: var(--azul-profundo); }

    .why-sec { display: flex; flex-direction: column; gap: 2px; }

    .why-sec__title {
      font-size: 14px;
      font-weight: 600;
      color: var(--azul-profundo);
      line-height: normal;
      white-space: nowrap;
    }

    .why-sec__copago {
      font-size: 12px;
      font-weight: 300;
      color: var(--azul-profundo);
      line-height: normal;
    }

    .why-sec__list {
      list-style: disc;
      padding-left: 21px;
      line-height: 0;
    }

    .why-sec__list li {
      font-size: 14px;
      font-weight: 400;
      color: var(--gris-500);
      line-height: normal;
      margin-bottom: 0;
    }

    .card-cta {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 16px;
      margin-top: auto;
    }

    .btn-cotizar {
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 1 0 0;
      max-width: 427px;
      min-width: 150px;
      height: 40px;
      background: var(--azul-vivo);
      color: var(--blanco);
      border: none;
      border-radius: 28px;
      font-family: var(--f);
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: background .2s, transform .1s;
    }
    .btn-cotizar:hover  { background: #1558E0; }
    .btn-cotizar:active { transform: scale(.98); }

    /* ═══════════════
       COMPARADOR
    ══════════════════ */
    .compare {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      width: 100%;
    }

    .compare__title {
      display: flex;
      height: 36px;
      justify-content: center;
      align-items: center;
      gap: 10px;
      font-size: 24px;
      font-weight: 700;
      color: var(--azul-vivo);
      white-space: nowrap;
      width: 100%;
    }

    .acordeon {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
    }

    .ac-item {
      background: var(--blanco);
      border: 1px solid var(--borde-azul);
      border-radius: 12px;
      box-shadow: var(--sombra-ac);
    }
    .ac-item.open { box-shadow: none; }

    .ac-btn {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 16px;
      background: none;
      border: none;
      cursor: pointer;
      width: 100%;
      font-family: var(--f);
      text-align: left;
    }

    .ac-btn__txt { flex: 1; display: flex; flex-direction: column; gap: 4px; }

    .ac-btn__title {
      font-size: 16px;
      font-weight: 700;
      color: var(--azul-profundo);
      line-height: normal;
    }

    .ac-btn__sub {
      font-size: 14px;
      font-weight: 400;
      color: var(--texto-sec);
      line-height: normal;
    }

    .ds-chevron {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      flex-shrink: 0;
      transition: transform var(--tr);
    }
    .ds-chevron svg { display: block; }
    .ac-btn__icon { flex-shrink: 0; }
    .ac-item.open .ac-btn__icon .ds-chevron { transform: rotate(180deg); }

    .ac-body {
      display: none;
      padding: 0 16px 24px;
    }
    .ac-item.open .ac-body { display: block; }

    /* ── Tabla comparador — grid compartido header + filas ── */
    .ac-tbl {
      background: var(--blanco);
      border-radius: 14px;
      padding: 12px;
      display: flex;
      flex-direction: column;
    }

    .ac-tbl-row {
      display: grid;
      grid-template-columns: 1fr repeat(3, 56px);
      gap: 4px;
      align-items: center;
      padding: 10px 8px;
      border-radius: 10px;
    }
    .ac-tbl-row--header {
      padding: 0 8px 12px;
      align-items: stretch;
      border-radius: 0;
    }
    .ac-tbl-row--stripe { background: #F9F9F9; }

    .ac-plan-badge {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      padding: 6px 4px;
      border: 1px solid var(--gris);
      border-radius: 10px;
      background: var(--blanco);
      font-weight: 700;
      color: var(--gris-500);
      text-align: center;
      line-height: 1.2;
      min-height: 56px;
    }

    .paw-badge-img { display: none; flex-shrink: 0; }

    .badge-txt {
      font-size: 11px;
      font-weight: 700;
      color: var(--gris-500);
      text-align: center;
      line-height: 1.2;
    }
    .badge-plan-lbl { display: block; }

    .ac-tbl-label {
      font-size: 12px;
      color: var(--gris-500);
      line-height: 15px;
      padding-right: 4px;
      min-width: 0;
    }

    .ac-tbl-val {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      line-height: 13.75px;
      color: var(--texto-sec);
      text-align: center;
    }
    .ac-val-text { font-size: 11px; line-height: 13.75px; color: var(--texto-sec); }

    .ds-check, .ds-dash {
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .ds-check img, .ds-dash img { width: 20px; height: 20px; }

    /* ════════════════
       DESKTOP ≥ 1024px
    ═════════════════ */
    @media (min-width: 1024px) {

      .planes {
        gap: 40px;
        padding: 60px 40px 80px;
      }

      .planes__tabs {
        width: 587px;
        max-width: 100%;
        height: 56px;
        flex-shrink: 0;
        align-self: flex-start;
        gap: 4px;
      }

      .tab-btn {
        flex: 1;
        width: auto;
        flex-direction: row;
        justify-content: flex-start;
        gap: 4px;
        height: 56px;
        padding: 8px 16px;
        border-radius: 12px;
        font-size: 16px;
        text-align: left;
      }

      .tab-label--long  { display: inline; }
      .tab-label--short { display: none; }

      .planes__grid {
        flex-direction: row;
        align-items: stretch;
        justify-content: center;
        gap: 40px;
      }

      .plan-card { width: 336px; flex-shrink: 0; height: auto; }
      .plan-card__head { padding-top: 24px; }
      .card-toggle { display: none; }
      .card-why { max-height: none !important; overflow: visible; }

      .card-cta { justify-content: center; padding: 20px 16px 24px; }
      .btn-cotizar { flex: none; width: 304px; }

      /* Comparador */
      .compare { gap: 16px; max-width: 914px; }
      .compare__title { display: block; margin-bottom: 0; }
      .acordeon { gap: 16px; }

      .ac-tbl-row {
        grid-template-columns: 1fr repeat(3, 152px);
        gap: 8px;
        padding: 12px 8px;
        border-radius: 12px;
      }
      .ac-tbl-row--header { padding: 0 8px 16px; border-radius: 0; }
      .ac-tbl-label { font-size: 14px; padding-right: 8px; }
      .ac-tbl-val { font-size: 14px; }
      .ac-val-text { font-size: 14px; }
      .ds-check img, .ds-dash img { width: 24px; height: 24px; }

      .ac-plan-badge {
        display: flex;
        flex-direction: row;
        padding: 8px 16px;
        justify-content: center;
        align-items: center;
        gap: 4px;
        border-radius: 12px;
        border: 1px solid #888B8D;
        background: #FFF;
        min-height: auto;
        color: var(--gris-500);
      }
      .paw-badge-img { display: block; width: 24px; height: 24px; }
      .badge-txt { font-size: 16px; font-weight: 700; white-space: nowrap; color: var(--gris-500); }
      .badge-plan-lbl { display: inline; }
    }
  </style>
</head>

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   RENDER HELPERS
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function cellVal(v) {
  if (v === true)  return DS_CHECK;
  if (v === false) return DS_DASH;
  return `<span class="ac-val-text">${v}</span>`;
}

function tbl(ac) {
  const plans = ['Esencial', 'Clásico', 'Global'];
  const paw = `<img class="paw-badge-img" src="${A.paw}" alt="">`;
  const headerRow = `<div class="ac-tbl-row ac-tbl-row--header">
    <div></div>
    ${plans.map(p => `<div class="ac-plan-badge">${paw}<span class="badge-txt"><span class="badge-plan-lbl">Plan </span>${p}</span></div>`).join('')}
  </div>`;
  const dataRows = ac.rows.map(([lbl, v1, v2, v3], i) => `
    <div class="ac-tbl-row${i%2===0 ? ' ac-tbl-row--stripe' : ''}">
      <div class="ac-tbl-label">${lbl}</div>
      <div class="ac-tbl-val">${cellVal(v1)}</div>
      <div class="ac-tbl-val">${cellVal(v2)}</div>
      <div class="ac-tbl-val">${cellVal(v3)}</div>
    </div>`).join('');
  return `<div class="ac-tbl">${headerRow}${dataRows}</div>`;
}

function covRows(covs) {
  return covs.map((c, i) => `
    <div class="cov-row">
      <div class="cov-row__text">
        <div class="cov-row__top">
          <span class="cov-lbl">${c.lbl}</span>
          <span class="cov-val">${c.val}</span>
        </div>
        <span class="cov-note">${c.note}</span>
      </div>
      ${i < covs.length - 1 ? '<div class="cov-divider"></div>' : ''}
    </div>`).join('');
}

function whyDesc(d) {
  if (!d) return '';
  return `<p class="why-desc">${d.pre}<strong>${d.bold}</strong>${d.suf}</p>`;
}

function whySecs(secs) {
  return secs.map(s => `
    <div class="why-sec">
      <span class="why-sec__title">${s.title}</span>
      ${s.copago ? `<span class="why-sec__copago">${s.copago}</span>` : ''}
      <ul class="why-sec__list">${s.items.map(i => `<li><span style="line-height:normal">${i}</span></li>`).join('')}</ul>
    </div>`).join('');
}

function card(p, idx) {
  const toggleId = `why-${idx}`;
  return `
  <article class="plan-card">
    <div class="plan-card__head">
      <h3 class="card-name">${p.name}</h3>
      <div class="card-price-row">
        <span class="price-desde">Desde</span>
        <span class="price-val">${p.price}</span>
        <span class="price-periodo">/ mensual</span>
      </div>
      <p class="card-desc">${p.desc}</p>
    </div>
    <div class="card-cov-wrap">
      <div class="card-cov-inner">${covRows(p.cov)}</div>
    </div>
    <button class="card-toggle" onclick="toggleWhy(this,'${toggleId}')" aria-expanded="false">
      <span class="card-toggle__label">Ver detalles</span>
      <span class="card-toggle__arrow">
        <span class="ds-chevron">${SVG_CHEVRON}</span>
      </span>
    </button>
    <div class="card-why" id="${toggleId}">
      <div class="why-inner">
        <p class="why-title">${p.whyTitle}</p>
        ${whyDesc(p.whyDesc)}
        ${whySecs(p.secs)}
      </div>
    </div>
    <div class="card-cta">
      <button class="btn-cotizar">Cotizar</button>
    </div>
  </article>`;
}

function panel(key, active) {
  const plans = PLANES[key];
  const el = document.createElement('div');
  el.className = 'planes__panel' + (active ? ' active' : '');
  el.id = 'panel-' + key;
  el.innerHTML = `<div class="planes__grid">${plans.map((p, i) => card(p, key + i)).join('')}</div>`;
  return el;
}

function tabs() {
  return TABS.map((t, i) => `
    <button class="tab-btn${i===0?' active':''}" onclick="switchTab('${t.key}',this)">
      <span class="tab-icon-wrap">
        <span class="tab-icon-inner" style="inset:${t.inset}">
          <img class="tab-icon" src="${t.icon}" alt="${t.alt}">
        </span>
      </span>
      <span class="tab-label tab-label--short">${t.short}</span>
      <span class="tab-label tab-label--long">${t.long}</span>
    </button>`).join('');
}

function acordeon(species) {
  return ACCORDION_DATA[species].map((ac, i) => `
    <div class="ac-item" id="ac${i}">
      <button class="ac-btn" onclick="toggleAc(this.closest('.ac-item'))">
        <div class="ac-btn__txt">
          <span class="ac-btn__title">${ac.title}</span>
          <span class="ac-btn__sub">${ac.sub}</span>
        </div>
        <span class="ac-btn__icon">
          <span class="ds-chevron">${SVG_CHEVRON}</span>
        </span>
      </button>
      <div class="ac-body">${tbl(ac)}</div>
    </div>`).join('');
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   MOUNT
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
(function () {
  const root    = document.getElementById('planes');
  const compare = root.querySelector('.compare');
  document.getElementById('tabs-el').innerHTML = tabs();
  root.insertBefore(panel('perros', true),  compare);
  root.insertBefore(panel('gatos',  false), compare);
  document.getElementById('acordeon-el').innerHTML = acordeon('perros');
})();

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   INTERACCIONES
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function switchTab(key, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.planes__panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + key).classList.add('active');
  document.getElementById('acordeon-el').innerHTML = acordeon(key);
}

function toggleWhy(btn, id) {
  const why = document.getElementById(id);
  btn.classList.toggle('open');
  btn.setAttribute('aria-expanded', btn.classList.contains('open'));
  why.classList.toggle('open');
}

function toggleAc(item) {
  item.classList.toggle('open');
}
</script>
